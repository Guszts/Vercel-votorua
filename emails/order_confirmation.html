<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8" /><title>Pedido confirmado</title></head>
<body style="margin:0;padding:0;background:#fafaf9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#292524;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#fafaf9;padding:32px 16px;">
  <tr><td align="center">
    <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:24px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.04);">
      <tr><td style="background:linear-gradient(135deg,#059669 0%,#065f46 100%);padding:40px 40px 32px 40px;color:#fff;">
        <p style="margin:0;font-size:11px;letter-spacing:3px;font-weight:700;text-transform:uppercase;opacity:.85;">Pedido confirmado</p>
        <h1 style="margin:8px 0 0 0;font-size:28px;font-weight:900;letter-spacing:-0.5px;">#{{order_id}}</h1>
      </td></tr>
      <tr><td style="padding:32px 40px 0 40px;">
        <p style="margin:0 0 20px 0;font-size:17px;line-height:1.55;">Oi {{name}}, recebemos seu pedido! 🍱 Já estamos preparando tudo com muito carinho.</p>
      </td></tr>
      <tr><td style="padding:0 40px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#fafaf9;border-radius:16px;padding:20px;">
          <tr><td>
            <p style="margin:0 0 12px 0;font-size:11px;letter-spacing:2px;font-weight:800;text-transform:uppercase;color:#78716c;">Itens</p>
            {{#each items}}
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:6px 0;border-bottom:1px dashed #e7e5e4;">
              <tr>
                <td style="font-weight:700;font-size:15px;">{{qty}}× {{name}}</td>
                <td align="right" style="font-weight:800;font-size:15px;color:#059669;">{{price}}</td>
              </tr>
            </table>
            {{/each}}
          </td></tr>
        </table>
      </td></tr>
      <tr><td style="padding:20px 40px 8px 40px;">
        <table role="presentation" width="100%">
          <tr>
            <td style="font-size:14px;font-weight:700;color:#78716c;">Total</td>
            <td align="right" style="font-size:24px;font-weight:900;color:#dc2626;">{{total}}</td>
          </tr>
        </table>
      </td></tr>
      <tr><td style="padding:16px 40px 32px 40px;border-top:1px solid #f5f5f4;">
        <p style="margin:0;font-size:13px;color:#78716c;line-height:1.6;">Você receberá outro email assim que o status mudar. Qualquer dúvida, chame no WhatsApp.</p>
      </td></tr>
    </table>
  </td></tr>
</table>
</body></html>
