<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8" /><title>Status atualizado</title></head>
<body style="margin:0;padding:0;background:#fafaf9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#292524;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#fafaf9;padding:32px 16px;">
  <tr><td align="center">
    <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:24px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.04);">
      <tr><td style="background:linear-gradient(135deg,#f59e0b 0%,#b45309 100%);padding:40px 40px 32px 40px;color:#fff;">
        <p style="margin:0;font-size:11px;letter-spacing:3px;font-weight:700;text-transform:uppercase;opacity:.9;">Status do pedido</p>
        <h1 style="margin:8px 0 0 0;font-size:28px;font-weight:900;letter-spacing:-0.5px;">#{{order_id}} — {{status}}</h1>
      </td></tr>
      <tr><td style="padding:32px 40px;">
        <p style="margin:0 0 16px 0;font-size:17px;line-height:1.55;">Oi {{name}}! Seu pedido agora está <strong style="color:#b45309;">{{status}}</strong>.</p>
        <p style="margin:0 0 8px 0;font-size:14px;color:#78716c;">Total do pedido: <strong style="color:#292524;">{{total}}</strong></p>
      </td></tr>
      <tr><td style="padding:16px 40px 32px 40px;border-top:1px solid #f5f5f4;">
        <p style="margin:0;font-size:13px;color:#78716c;line-height:1.6;">Acesse o histórico no app Vitória para ver todos os detalhes do pedido.</p>
      </td></tr>
    </table>
  </td></tr>
</table>
</body></html>
