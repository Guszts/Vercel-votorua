<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8" /><title>Resposta ao seu depoimento</title></head>
<body style="margin:0;padding:0;background:#fafaf9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#292524;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#fafaf9;padding:32px 16px;">
  <tr><td align="center">
    <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:24px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.04);">
      <tr><td style="background:linear-gradient(135deg,#8b5cf6 0%,#6d28d9 100%);padding:40px 40px 32px 40px;color:#fff;">
        <p style="margin:0;font-size:11px;letter-spacing:3px;font-weight:700;text-transform:uppercase;opacity:.85;">Vitória respondeu</p>
        <h1 style="margin:8px 0 0 0;font-size:28px;font-weight:900;letter-spacing:-0.5px;">Obrigado, {{name}}! 💬</h1>
      </td></tr>
      <tr><td style="padding:32px 40px 8px 40px;">
        <p style="margin:0 0 8px 0;font-size:12px;letter-spacing:2px;font-weight:800;text-transform:uppercase;color:#78716c;">Seu depoimento</p>
        <div style="background:#fafaf9;border-left:4px solid #e7e5e4;padding:16px;border-radius:8px;margin-bottom:20px;">
          <p style="margin:0 0 6px 0;font-size:14px;color:#f59e0b;font-weight:900;">{{rating}}/5 ⭐</p>
          <p style="margin:0;font-size:15px;line-height:1.55;color:#44403c;">"{{content}}"</p>
        </div>
        <p style="margin:0 0 8px 0;font-size:12px;letter-spacing:2px;font-weight:800;text-transform:uppercase;color:#78716c;">Nossa resposta</p>
        <div style="background:#faf5ff;border-left:4px solid #8b5cf6;padding:16px;border-radius:8px;">
          <p style="margin:0;font-size:16px;line-height:1.6;color:#292524;">{{reply}}</p>
        </div>
      </td></tr>
      <tr><td style="padding:24px 40px 32px 40px;">
        <p style="margin:0;font-size:13px;color:#78716c;line-height:1.6;">Sua opinião nos move todo dia. Até o próximo pedido! 🍱</p>
      </td></tr>
    </table>
  </td></tr>
</table>
</body></html>
